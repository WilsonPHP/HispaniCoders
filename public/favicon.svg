<svg xmlns="http://www.w3.org/2000/svg" width="544" height="536" viewBox="0 0 544 536" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">HispaniCoders Logo</title>
  <desc id="logoDesc">Geometric knot emblem in white with dark outline</desc>
  <defs>
    <filter id="blueEdge" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#1d2cff" flood-opacity="0.65"/>
    </filter>
    <style>
      .k {
        fill: #ffffff;
        stroke: #0f1320;
        stroke-width: 5;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <g filter="url(#blueEdge)">
    <polygon class="k" points="272,8 354,90 190,90"/>
    <rect class="k" x="96" y="90" width="360" height="84"/>
    <polygon class="k" points="96,174 344,422 262,504 14,256"/>
    <polygon class="k" points="178,174 508,174 426,256 178,256"/>
    <polygon class="k" points="344,256 426,338 262,338"/>
    <rect class="k" x="344" y="338" width="112" height="84"/>
    <rect class="k" x="96" y="338" width="84" height="84"/>
  </g>
</svg>
